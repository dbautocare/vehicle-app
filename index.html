<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Valuation</title>
<style>
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#111827,#1f2937);padding:20px;margin:0;color:#111827}.container{max-width:900px;margin:auto;background:#fff;padding:22px;border-radius:18px;box-shadow:0 20px 50px rgba(0,0,0,.35)}h1{text-align:center;margin-bottom:5px}.subtitle{text-align:center;color:#6b7280;margin-bottom:20px}h3{color:#111827;border-left:5px solid #f97316;padding-left:10px}input,select,textarea{width:100%;padding:14px;margin-top:10px;box-sizing:border-box;border:1px solid #d1d5db;border-radius:10px;font-size:16px;background:#f9fafb}textarea{min-height:90px}button{width:100%;padding:14px;margin-top:15px;background:#f97316;color:white;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer}button:hover{background:#ea580c}.secondary-btn{background:#111827}.secondary-btn:hover{background:#374151}.card{background:#f9fafb;padding:16px;margin-top:15px;border-radius:14px;border:1px solid #e5e7eb}.hero-card{background:linear-gradient(135deg,#111827,#374151);color:white}.hero-card .small{color:#d1d5db}.value{font-size:24px;font-weight:bold;margin-top:10px}.score{font-size:32px;font-weight:bold}.small{color:#6b7280;font-size:14px;line-height:1.5}.profit{color:#15803d;font-size:24px;font-weight:bold}.loss{color:#dc2626;font-size:24px;font-weight:bold}.saved{background:#ecfdf5;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #bbf7d0}.warning{background:#fff7ed;border-color:#fed7aa}.bad{background:#fef2f2;border-color:#fecaca}.good{background:#ecfdf5;border-color:#bbf7d0}.mot-pass{background:#ecfdf5;border-color:#bbf7d0}.mot-fail{background:#fef2f2;border-color:#fecaca}.defect{margin:6px 0;padding:9px;background:white;border-radius:8px;border:1px solid #e5e7eb}.badge{display:inline-block;padding:7px 11px;border-radius:20px;background:#e5e7eb;margin:4px;font-size:13px;font-weight:bold}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.spec-option{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:10px;font-size:14px}.spec-option input{width:auto;margin:0}@media(max-width:700px){.grid,.spec-grid{grid-template-columns:1fr}}@media print{button,input,select,textarea,#savedValuations{display:none}body{background:white}.container{box-shadow:none}}
</style>
</head>
<body>
<div class="container">
<h1>Vehicle Valuation</h1><div class="subtitle">MOT-powered appraisal and buying decision tool</div>
<input id="registration" placeholder="Registration"><input id="vin" placeholder="VIN / chassis number">

<button onclick="autoFillMotDetails()">Auto-fill from Reg</button>

<button onclick="autoFillVinDetails()">Decode VIN</button>
    <div id="vehicleInfo" class="result-card"></div>
<div class="grid"><input id="mileage" type="number" placeholder="Current Mileage"><input id="lastMotMileage" type="text" placeholder="Mileage on last MOT" readonly></div><input id="lastMotDate" type="text" placeholder="Last MOT date" readonly>
<h3>Desirable Spec Options</h3><div class="spec-grid" id="specGrid"></div><textarea id="extraSpec" placeholder="Any other spec not listed above"></textarea>
<select id="condition"><option value="poor">Poor Overall Condition</option><option value="average">Average Overall Condition</option><option value="good" selected>Good Overall Condition</option><option value="excellent">Excellent Overall Condition</option></select>
<select id="serviceHistory"><option value="none">No Service History</option><option value="partial">Partial Service History</option><option value="full">Full Service History</option></select>
<h3>Appraisal Details</h3>
<select id="bodywork"><option value="good">Good Bodywork</option><option value="average">Average Bodywork</option><option value="poor">Poor Bodywork</option></select><select id="tyres"><option value="good">Good Tyres</option><option value="poor">Poor Tyres</option></select><select id="alloys"><option value="good">Good Alloys</option><option value="poor">Poor Alloys</option></select><select id="interior"><option value="good">Good Interior</option><option value="poor">Poor Interior</option></select><select id="warningLights"><option value="no">No Warning Lights</option><option value="yes">Warning Lights Present</option></select><select id="keys"><option value="two">Two Keys</option><option value="one">One Key</option></select><select id="v5"><option value="yes">V5 Present</option><option value="no">No V5</option></select><select id="motLength"><option value="long">Long MOT</option><option value="short">Short MOT</option><option value="none">No MOT</option></select><input id="owners" type="number" placeholder="Number of owners"><select id="gearbox"><option value="ok">Gearbox OK</option><option value="issue">Gearbox Issue</option></select><select id="clutch"><option value="ok">Clutch OK</option><option value="issue">Clutch Issue</option></select><textarea id="notes" placeholder="Notes e.g. dents, scratches, service due, tyres low, warning messages"></textarea>
<button class="secondary-btn" onclick="lookupVehicle()">Get Valuation</button><div id="results"></div><div id="savedValuations"></div></div>
<script>
let lastValuation=null;const specs=["Air Conditioning","Climate Control","Electric Windows","Heated Front Seats","Heated Rear Seats","Cooled Front Seats","Cooled Rear Seats","Apple CarPlay","Android Auto","Alloy Wheels","Cruise Control","Adaptive Cruise Control","Lane Assist","Blind Spot Monitoring","Upgraded Sound System","Harman Kardon","Pan Roof","Sun Roof","Pro Nav","360 Camera","Reverse Camera","Parking Sensors","Electric Tailgate","Keyless Entry","Keyless Start","Digital Dash","Head Up Display","Memory Seats","Electric Seats","Leather Seats","Massage Seats","Wireless Charging","LED Headlights","Matrix LED Headlights","Tow Bar"];
document.getElementById("specGrid").innerHTML=specs.map(s=>`<label class="spec-option"><input type="checkbox" class="specCheck" value="${s}"> ${s}</label>`).join("");
function formatDate(d){if(!d)return"Not available";return new Date(d).toLocaleDateString("en-GB")}function normaliseMotData(d){return Array.isArray(d)?(d[0]||null):(d||null)}function getSelectedSpec(){let checked=Array.from(document.querySelectorAll(".specCheck:checked")).map(b=>b.value);let extra=document.getElementById("extraSpec").value.trim();if(extra)checked.push(extra);return checked.join(", ")}function setMotLengthFromExpiry(expiryDate){const s=document.getElementById("motLength");if(!expiryDate){s.value="none";return}const days=Math.ceil((new Date(expiryDate)-new Date())/(1000*60*60*24));if(days<=0)s.value="none";else if(days<=90)s.value="short";else s.value="long"}
async function autoFillMotDetails() {

    const reg = document.getElementById("registration").value.trim();

    if (!reg) {

        alert("Please enter a registration first");

        return;

    }

    try {

        const [motResponse, dvlaResponse] = await Promise.all([

            fetch(`/api/mot/${reg}`),

            fetch(`/api/dvla/${reg}`)

        ]);

        let m = normaliseMotData(await motResponse.json());

        let d = await dvlaResponse.json();

        if (d) {

            const vehicleSummary =

                `${d.make || "Unknown"} ${d.yearOfManufacture || ""} ${d.fuelType || ""} ${d.colour || ""} ${d.engineCapacity ? d.engineCapacity + "cc" : ""}`;

            const vehicleInfoBox = document.getElementById("vehicleInfo");

            if (vehicleInfoBox) {

                vehicleInfoBox.innerHTML = `

                    <strong>${vehicleSummary}</strong><br>

                    Tax: ${d.taxStatus || "Unknown"}<br>

                    MOT: ${d.motStatus || "Unknown"}

                `;

            }

        }

        if (!m || !m.motTests || !m.motTests.length) {

            alert("DVLA details found, but no MOT history found");

            return;

        }

        const latest = m.motTests[0];

        document.getElementById("lastMotMileage").value =

            `${latest.odometerValue || ""} ${latest.odometerUnit || "mi"}`;

        document.getElementById("lastMotDate").value =

            `Last MOT date: ${formatDate(latest.completedDate)}`;

        setMotLengthFromExpiry(latest.expiryDate);

        alert("Vehicle details, last MOT mileage, MOT date and MOT length filled");

   } catch (e) {

    console.error(e);

    alert("Could not auto-fill vehicle details");

}

}  // closes autoFillMotDetails

async function autoFillVinDetails() {
    const vin=document.getElementById("vin").value.trim();

    if(!vin){

        alert("Please enter a VIN first");

        return;

    }

    try{

        const r=await fetch(`/api/vin/${vin}`);

        const d=await r.json();

        if(d.error){

    alert(d.error);

    return;

}

        const vehicleInfoBox=document.getElementById("vehicleInfo");

        if(vehicleInfoBox){

            vehicleInfoBox.innerHTML=`

                <strong>${d.make || "Unknown"} ${d.model || ""} ${d.year || ""}</strong><br>

                Fuel: ${d.fuel || "Unknown"}<br>

                Engine: ${d.engine ? d.engine+"L" : "Unknown"}<br>

                Body: ${d.bodyClass || "Unknown"}<br>

                Transmission: ${d.transmission || "Unknown"}

            `;

        }

        alert("VIN details decoded");

    }catch(e){

        console.error(e);

        alert("Could not decode VIN");

    }

}
function listHtml(arr){return(arr&&arr.length)?arr.map(x=>`<li>${x}</li>`).join(""):"<li>None recorded</li>"}
function buildMotAnalysisHtml(a){if(!a)return"";let c=a.motCategories;let cls=a.motRiskLevel==="High"?"bad":a.motRiskLevel==="Medium"?"warning":"good";return`<div class="card ${cls}"><h3>Automatic MOT Risk Scoring</h3><div class="score">${a.motRiskScore} / 100</div><p><strong>Risk Level:</strong> ${a.motRiskLevel}</p><ul>${listHtml(a.motRiskNotes)}</ul></div><div class="card"><h3>Mileage Anomaly Detection</h3><ul>${a.mileageAnomalies.length?a.mileageAnomalies.map(x=>`<li>${x}</li>`).join(""):"<li>No mileage anomalies detected</li>"}</ul></div><div class="card"><h3>Auto MOT Categorisation</h3><span class="badge">Corrosion: ${c.corrosion}</span><span class="badge">Tyres: ${c.tyres}</span><span class="badge">Brakes: ${c.brakes}</span><span class="badge">Suspension: ${c.suspension}</span><span class="badge">Lights: ${c.lights}</span><span class="badge">Emissions: ${c.emissions}</span></div><div class="card"><h3>Likely Retail Speed</h3><div class="score">${a.likelyRetailSpeedScore} / 100</div><p><strong>${a.likelyRetailSpeed}</strong></p></div>`}
function buildSpecAnalysisHtml(a){if(!a)return"";return`<div class="card good"><h3>Spec Scoring</h3><div class="score">${a.specScore} / 35</div><p><strong>Value added:</strong> £${a.specValueAdjustment}</p><ul>${listHtml(a.specNotes)}</ul></div>`}
function buildMotHtml(m){m=normaliseMotData(m);if(!m||!m.motTests||!m.motTests.length)return`<div class="card warning"><h3>MOT History</h3><p>No MOT history found.</p></div>`;let tests=m.motTests,latest=tests[0],days=latest.expiryDate?Math.ceil((new Date(latest.expiryDate)-new Date())/(1000*60*60*24)):null,w="";if(days!==null){if(days<=0)w=`<div class="card bad"><strong>MOT expired</strong></div>`;else if(days<=30)w=`<div class="card bad"><strong>MOT expires very soon:</strong> ${days} days remaining</div>`;else if(days<=90)w=`<div class="card warning"><strong>Short MOT:</strong> ${days} days remaining</div>`;else w=`<div class="card good"><strong>MOT length good:</strong> ${days} days remaining</div>`}let html=`${w}<div class="card"><h3>MOT History</h3><div class="small">Registration: ${m.registration||"Unknown"}<br>Make: ${m.make||"Unknown"}<br>Model: ${m.model||"Unknown"}<br>Fuel: ${m.fuelType||"Unknown"}<br>Colour: ${m.primaryColour||"Unknown"}<br>First Used: ${formatDate(m.firstUsedDate)}</div><div class="value">Current MOT Expiry: ${formatDate(latest.expiryDate)}</div><div class="value">Last Test: ${latest.testResult}</div><div class="small">Last MOT mileage: ${latest.odometerValue||"Unknown"} ${latest.odometerUnit||""}</div></div>`;tests.slice(0,8).forEach(t=>{let defects=t.defects&&t.defects.length?t.defects.map(d=>`<div class="defect"><strong>${d.type||"Defect"}:</strong> ${d.text||""}</div>`).join(""):`<div class="small">No defects recorded</div>`;html+=`<div class="card ${t.testResult==="PASSED"?"mot-pass":"mot-fail"}"><h4>${formatDate(t.completedDate)} - ${t.testResult}</h4><div class="small">Mileage: ${t.odometerValue||"Unknown"} ${t.odometerUnit||""}<br>Expiry: ${formatDate(t.expiryDate)}</div>${defects}</div>`});return html}
async function lookupVehicle(){const payload={registration:document.getElementById("registration").value.toUpperCase(),vin:document.getElementById("vin").value,mileage:Number(document.getElementById("mileage").value),lastMotMileage:document.getElementById("lastMotMileage").value,lastMotDate:document.getElementById("lastMotDate").value,spec:getSelectedSpec(),condition:document.getElementById("condition").value,serviceHistory:document.getElementById("serviceHistory").value,bodywork:document.getElementById("bodywork").value,tyres:document.getElementById("tyres").value,alloys:document.getElementById("alloys").value,interior:document.getElementById("interior").value,warningLights:document.getElementById("warningLights").value,keys:document.getElementById("keys").value,v5:document.getElementById("v5").value,motLength:document.getElementById("motLength").value,owners:Number(document.getElementById("owners").value||0),gearbox:document.getElementById("gearbox").value,clutch:document.getElementById("clutch").value,notes:document.getElementById("notes").value};if(!payload.registration){alert("Please enter registration");return}if(!payload.lastMotMileage){await autoFillMotDetails();payload.lastMotMileage=document.getElementById("lastMotMileage").value;payload.lastMotDate=document.getElementById("lastMotDate").value;payload.motLength=document.getElementById("motLength").value}if(!payload.mileage){alert("Please enter the current mileage");return}const r=await fetch("/vehicle",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});const data=await r.json();lastValuation={...payload,...data,date:new Date().toLocaleString()};let scoreClass=data.buyScore>=75?"good":data.buyScore<50?"bad":"warning";let adj=listHtml(data.adjustments),prep=data.prepCosts.length?data.prepCosts.map(i=>`<li>${i.item}: £${i.cost}</li>`).join(""):"<li>No major prep costs estimated</li>",problems=listHtml(data.commonProblems);document.getElementById("results").innerHTML=`<div class="card hero-card"><h2>${data.vehicle.make} ${data.vehicle.model}</h2><div class="small">${data.vehicle.year} • ${data.vehicle.fuel} • ${data.vehicle.colour} • Engine: ${data.vehicle.engine}</div><div class="value">Market Average: £${data.marketAverage}</div><div class="value">Trade Estimate: £${data.tradeValue}</div><div class="value">Retail Estimate: £${data.retailValue}</div><div class="small">Current mileage entered: ${payload.mileage}<br>${payload.lastMotMileage?"Mileage on last MOT: "+payload.lastMotMileage:""}${payload.lastMotDate?"<br>"+payload.lastMotDate:""}</div></div><div class="card"><h3>Selected Spec</h3><p>${payload.spec||"No desirable spec selected"}</p></div>${buildSpecAnalysisHtml(data.specAnalysis)}<div class="card good"><h3>Vehicle Grade</h3><div class="score">${data.vehicleGrade.grade}</div><p><strong>Score:</strong> ${data.vehicleGrade.gradeScore} / 100</p><p>${data.vehicleGrade.summary}</p></div><div class="card warning"><h3>AI Negotiation Helper</h3><ul>${listHtml(data.negotiationHelper)}</ul></div><div class="card"><h3>VIN Check</h3><p><strong>VIN:</strong> ${data.vinDecode.vin||"Not entered"}</p><p><strong>Format valid:</strong> ${data.vinDecode.validFormat?"Yes":"No"}</p><p>${data.vinDecode.message}</p></div>${buildMotAnalysisHtml(data.motAnalysis)}${buildMotHtml(data.motData)}<div class="card good"><h3>AI Desirability Score</h3><div class="score">${data.desirabilityScore} / 100</div></div><div class="card ${scoreClass}"><h3>Should I Buy This?</h3><div class="score">${data.buyScore} / 100</div><p>${data.buyAdvice}</p></div><div class="card"><h3>Estimated Prep Costs</h3><ul>${prep}</ul><div class="value">Estimated Prep Total: £${data.estimatedPrepTotal}</div></div><div class="card"><h3>Common Problems / Checks</h3><ul>${problems}</ul></div><div class="card"><h3>AI-style Valuation Adjustments</h3><ul>${adj}</ul></div><div class="card"><h3>Stock / Sale Details</h3><input type="date" id="boughtDate"><input type="date" id="soldDate"><input type="number" id="advertisedPrice" placeholder="Advertised Price"><input type="number" id="actualSoldPrice" placeholder="Actual Sold Price"><button onclick="calculateStockDetails()">Calculate Days in Stock / Sold Profit</button><div id="stockResult"></div></div><div class="card"><h3>Margin Calculator</h3><input type="number" id="purchase" placeholder="Purchase Price"><input type="number" id="prep" placeholder="Manual Prep Costs"><input type="number" id="advertising" placeholder="Advertising Cost"><button onclick="calculateMargin(${data.retailValue})">Calculate Margin</button><div id="marginResult"></div></div><div class="card"><h3>Appraisal Notes</h3>${payload.notes||"No notes added"}</div><button onclick="saveValuation()">Save Valuation</button><button onclick="window.print()">Save as PDF / Print</button>`}
function calculateMargin(retail){let purchase=Number(document.getElementById("purchase").value||0),prep=Number(document.getElementById("prep").value||0),advertising=Number(document.getElementById("advertising").value||0),total=purchase+prep+advertising,profit=retail-total;document.getElementById("marginResult").innerHTML=`<div class="${profit>=0?"profit":"loss"}">Projected Profit: £${profit}</div><div class="small">Total Investment: £${total}</div>`;if(lastValuation){lastValuation.purchase=purchase;lastValuation.manualPrep=prep;lastValuation.advertising=advertising;lastValuation.totalInvestment=total;lastValuation.projectedProfit=profit}}
function calculateStockDetails(){let b=document.getElementById("boughtDate").value,s=document.getElementById("soldDate").value,a=Number(document.getElementById("advertisedPrice").value||0),sold=Number(document.getElementById("actualSoldPrice").value||0),days=0;if(b&&s)days=Math.round((new Date(s)-new Date(b))/(1000*60*60*24));let soldText="";if(lastValuation&&sold&&lastValuation.totalInvestment){let p=sold-lastValuation.totalInvestment;soldText=`<div class="${p>=0?"profit":"loss"}">Actual Sold Profit: £${p}</div>`;lastValuation.actualSoldProfit=p}document.getElementById("stockResult").innerHTML=`<div class="small">Days in Stock: ${days}</div><div class="small">Advertised Price: £${a}</div><div class="small">Actual Sold Price: £${sold}</div>${soldText}`;if(lastValuation){lastValuation.boughtDate=b;lastValuation.soldDate=s;lastValuation.daysInStock=days;lastValuation.advertisedPrice=a;lastValuation.actualSoldPrice=sold}}
function saveValuation(){if(!lastValuation){alert("Please run a valuation first");return}const saved=JSON.parse(localStorage.getItem("valuations"))||[];saved.push(lastValuation);localStorage.setItem("valuations",JSON.stringify(saved));loadSaved();alert("Valuation saved")}
function loadSaved(){const saved=JSON.parse(localStorage.getItem("valuations"))||[];let html="<h2>Saved Valuations</h2>";saved.slice().reverse().forEach(i=>{html+=`<div class="saved"><strong>${i.registration}</strong><br>${i.vehicle.make} ${i.vehicle.model}<br>Grade: ${i.vehicleGrade?.grade||"N/A"}<br>Current Mileage: ${i.mileage||0}<br>Last MOT Mileage: ${i.lastMotMileage||"Not recorded"}<br>Spec: ${i.spec||"No spec selected"}<br>Retail: £${i.retailValue}<br>Trade: £${i.tradeValue}<br>Prep Estimate: £${i.estimatedPrepTotal||0}<br>Projected Profit: £${i.projectedProfit||0}<br>${i.date}</div>`});document.getElementById("savedValuations").innerHTML=html}loadSaved();
</script>
</body>
</html>
